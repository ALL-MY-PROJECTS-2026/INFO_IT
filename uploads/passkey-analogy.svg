<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" font-family="'Noto Sans KR',system-ui,'Malgun Gothic',sans-serif" aria-label="비유: 비밀번호는 아무나 베껴 가는 자물쇠 번호, 패스키는 나만 가진 실물 열쇠.">
  <title>비밀번호 대 패스키 비유</title>
  <rect x="2" y="2" width="1196" height="516" rx="20" fill="#f8f9fb" stroke="#eceef1" stroke-width="2"/>
  <line x1="600" y1="70" x2="600" y2="450" stroke="#e2e5ea" stroke-width="2"/>

  <rect x="255" y="120" width="90" height="66" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="5"/>
  <path d="M273 120 v-12 a27 27 0 0 1 54 0 v12" fill="none" stroke="#2563eb" stroke-width="5"/>
  <circle cx="300" cy="150" r="8" fill="#2563eb"/>
  <rect x="296.5" y="153" width="7" height="16" rx="3" fill="#2563eb"/>
  <text x="300" y="300" font-size="48" font-weight="800" fill="#2563eb" text-anchor="middle">비밀번호</text>
  <text x="300" y="352" font-size="25" fill="#5c6673" text-anchor="middle">아무나 베껴 가는</text>
  <text x="300" y="388" font-size="25" fill="#5c6673" text-anchor="middle">자물쇠 번호</text>

  <circle cx="885" cy="150" r="42" fill="#ffe4e6" stroke="#e11d48" stroke-width="5"/>
  <circle cx="885" cy="150" r="9" fill="#e11d48"/>
  <path d="M905 168 l30 30 M927 190 l12 -12 M935 182 l10 10" stroke="#e11d48" stroke-width="5" stroke-linecap="round" fill="none"/>
  <text x="900" y="300" font-size="48" font-weight="800" fill="#e11d48" text-anchor="middle">패스키</text>
  <text x="900" y="352" font-size="25" fill="#5c6673" text-anchor="middle">나만 가진</text>
  <text x="900" y="388" font-size="25" fill="#5c6673" text-anchor="middle">실물 열쇠</text>
