<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif" aria-label="자바 실행 3단계: 작성(.java 파일에 코드) → 컴파일(컴퓨터가 알아듣는 .class로 번역) → 실행(화면에 결과 출력).">
  <title>자바 코드 실행 3단계</title>
  <style>.m{font-family:'JetBrains Mono',ui-monospace,Consolas,monospace}</style>
  <rect width="1200" height="300" fill="#ffffff"/>

  <text x="64" y="70" font-size="30" font-weight="700" fill="#26323c">코드가 화면에 나오기까지</text>

  <g>
    <rect x="64" y="104" width="316" height="122" rx="18" fill="#eef4ff" stroke="#d6e4ff" stroke-width="1.5"/>
    <circle cx="102" cy="146" r="16" fill="#3b6fd4"/><text x="102" y="152" font-size="17" font-weight="700" fill="#fff" text-anchor="middle">1</text>
    <text x="132" y="153" font-size="24" font-weight="700" fill="#26323c">작성</text>
    <text x="92" y="196" font-size="16" fill="#77828d">HelloWorld.java 에 코드를 씁니다</text>
  </g>
  <path d="M388 165 L438 165" fill="none" stroke="#c2ccd6" stroke-width="2.5" marker-end="url(#a)"/>

  <g>
    <rect x="442" y="104" width="316" height="122" rx="18" fill="#fff4e0" stroke="#f2dfb5" stroke-width="1.5"/>
    <circle cx="480" cy="146" r="16" fill="#d98a1a"/><text x="480" y="152" font-size="17" font-weight="700" fill="#fff" text-anchor="middle">2</text>
    <text x="510" y="153" font-size="24" font-weight="700" fill="#26323c">컴파일 <tspan font-size="16" fill="#77828d">(번역)</tspan></text>
    <text x="470" y="196" font-size="16" fill="#77828d">컴퓨터가 알아듣는 .class 로</text>
  </g>
  <path d="M766 165 L816 165" fill="none" stroke="#c2ccd6" stroke-width="2.5" marker-end="url(#a)"/>

  <g>
    <rect x="820" y="104" width="316" height="122" rx="18" fill="#e9f7ef" stroke="#cdeeda" stroke-width="1.5"/>
    <circle cx="858" cy="146" r="16" fill="#2e9e6b"/><text x="858" y="152" font-size="17" font-weight="700" fill="#fff" text-anchor="middle">3</text>
    <text x="888" y="153" font-size="24" font-weight="700" fill="#26323c">실행</text>
    <text x="848" y="196" font-size="16" fill="#77828d">화면에 Hello, World! 출력</text>
  </g>

  <text x="64" y="270" font-size="16" fill="#77828d">이클립스 같은 도구가 이 과정을 <tspan fill="#26323c" font-weight="700">버튼 하나</tspan>로 대신 해 줍니다.</text>
  <text x="1136" y="270" font-size="13" fill="#c2c9d2" text-anchor="end">PANCO_IT</text>

  <defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#c2ccd6"/></marker></defs>
</svg>
