<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" width="1200" height="520" role="img" aria-label="패스키 확산 현황 수치">
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>
  <style>
    .f{font-family:Pretendard,'Pretendard Variable',-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif}
    .m{font-family:'JetBrains Mono',ui-monospace,SFMono-Regular,Consolas,monospace}
    .big{font-size:60px;font-weight:700;fill:#e6edf3}
    .cap{font-size:18px;fill:#8b949e}
    .note{font-size:15px;fill:#576270}
  </style>

  <rect width="1200" height="520" fill="#0d1117"/>
  <rect width="1200" height="520" fill="url(#grid)"/>

  <rect x="72" y="56" width="4" height="24" rx="2" fill="#f0b429"/>
  <text class="m" x="92" y="75" font-size="18" letter-spacing="3" fill="#8b949e">2026. 07 기준</text>
  <text class="f" x="72" y="128" font-size="38" font-weight="700" fill="#e6edf3">패스키는 지금 어디까지 왔나</text>

  <!-- card 1 -->
  <g transform="translate(72,180)">
    <rect x="0" y="0" width="328" height="240" rx="16" fill="#161b22" stroke="#263041" stroke-width="1.5"/>
    <rect x="0" y="0" width="328" height="4" rx="2" fill="#6ea8fe"/>
    <text class="f big" x="32" y="104">약 50억</text>
    <text class="f cap" x="32" y="146">전 세계 활성 패스키 수</text>
    <line x1="32" y1="176" x2="296" y2="176" stroke="#21262d"/>
    <text class="f note" x="32" y="204">FIDO 얼라이언스 추산 · 2026.05</text>
  </g>

  <!-- card 2 -->
  <g transform="translate(436,180)">
    <rect x="0" y="0" width="328" height="240" rx="16" fill="#161b22" stroke="#263041" stroke-width="1.5"/>
    <rect x="0" y="0" width="328" height="4" rx="2" fill="#f0b429"/>
    <text class="f big" x="32" y="104">48<tspan font-size="36">%</tspan></text>
    <text class="f cap" x="32" y="146">상위 100대 사이트 지원률</text>
    <rect x="32" y="170" width="264" height="10" rx="5" fill="#21262d"/>
    <rect x="32" y="170" width="127" height="10" rx="5" fill="#f0b429"/>
    <text class="f note" x="32" y="212">아직 절반은 비밀번호만 사용</text>
  </g>

  <!-- card 3 -->
  <g transform="translate(800,180)">
    <rect x="0" y="0" width="328" height="240" rx="16" fill="#161b22" stroke="#263041" stroke-width="1.5"/>
    <rect x="0" y="0" width="328" height="4" rx="2" fill="#6ea8fe"/>
    <text class="f big" x="32" y="104">5곳</text>
    <text class="f cap" x="32" y="146">지금 켤 수 있는 주요 서비스</text>
    <line x1="32" y1="176" x2="296" y2="176" stroke="#21262d"/>
    <text class="f note" x="32" y="204">구글 · 애플 · MS · 네이버 · 카카오</text>
  </g>

  <text class="m" x="1128" y="486" font-size="15" letter-spacing="2" fill="#39424e" text-anchor="end">PANCO_IT</text>
</svg>
