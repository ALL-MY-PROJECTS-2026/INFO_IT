name: Update visitor stats

# GA4 방문 통계를 주기적으로 조회해 public/stats.json 을 갱신한다.
# 값이 바뀌면 main 에 커밋 → deploy 워크플로가 라이브(pancoit.site)에 반영한다.
on:
  schedule:
    - cron: '7 */3 * * *' # 3시간마다(UTC 기준)
  workflow_dispatch: # 수동 실행 버튼

permissions:
  contents: write

concurrency:
  group: update-stats
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install auth lib (레포 의존성 오염 없이 임시 설치)
        run: npm i --no-save google-auth-library

      - name: Fetch GA4 stats
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GA4_SA_KEY: ${{ secrets.GA4_SA_KEY }}
        run: node scripts/fetch-ga4-stats.mjs

      - name: Commit & push if changed
        run: |
          if git diff --quiet -- public/stats.json; then
            echo "변경 없음 — 커밋 생략"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/stats.json
            git commit -m "chore(stats): 방문 통계 갱신"
            git push
          fi
