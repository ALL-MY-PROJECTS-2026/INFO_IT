<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" width="1200" height="460" role="img" aria-label="패스키 로그인 4단계 흐름">
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#3f4c5e"/>
    </marker>
  </defs>
  <style>
    .f{font-family:Pretendard,'Pretendard Variable',-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif}
    .m{font-family:'JetBrains Mono',ui-monospace,SFMono-Regular,Consolas,monospace}
    .st{font-size:22px;font-weight:700;fill:#e6edf3}
    .sd{font-size:17px;fill:#8b949e}
  </style>

  <rect width="1200" height="460" fill="#0d1117"/>
  <rect width="1200" height="460" fill="url(#grid)"/>

  <rect x="72" y="52" width="4" height="24" rx="2" fill="#f0b429"/>
  <text class="m" x="92" y="71" font-size="18" letter-spacing="3" fill="#8b949e">로그인 순간</text>
  <text class="f" x="72" y="122" font-size="38" font-weight="700" fill="#e6edf3">서버로 가는 건 비밀번호가 아니라 <tspan fill="#f0b429">서명 한 장</tspan></text>

  <g transform="translate(72,176)">
    <!-- step 1 -->
    <g>
      <rect x="0" y="0" width="240" height="176" rx="16" fill="#161b22" stroke="#263041" stroke-width="1.5"/>
      <circle cx="34" cy="38" r="17" fill="#0f2545" stroke="#1f4b8f"/>
      <text class="m" x="34" y="45" font-size="17" fill="#6ea8fe" text-anchor="middle">1</text>
      <text class="f st" x="24" y="94">본인 확인 요청</text>
      <text class="f sd" x="24" y="126">서비스가 내 기기에</text>
      <text class="f sd" x="24" y="150">증명을 요구</text>
    </g>
    <line x1="252" y1="88" x2="288" y2="88" stroke="#3f4c5e" stroke-width="2" marker-end="url(#ar)"/>

    <!-- step 2 -->
    <g transform="translate(296,0)">
      <rect x="0" y="0" width="240" height="176" rx="16" fill="#161b22" stroke="#263041" stroke-width="1.5"/>
      <circle cx="34" cy="38" r="17" fill="#0f2545" stroke="#1f4b8f"/>
      <text class="m" x="34" y="45" font-size="17" fill="#6ea8fe" text-anchor="middle">2</text>
      <text class="f st" x="24" y="94">지문으로 잠금 해제</text>
      <text class="f sd" x="24" y="126">개인 키가 기기 안에서</text>
      <text class="f sd" x="24" y="150">서명을 생성</text>
    </g>
    <line x1="548" y1="88" x2="584" y2="88" stroke="#3f4c5e" stroke-width="2" marker-end="url(#ar)"/>

    <!-- step 3 -->
    <g transform="translate(592,0)">
      <rect x="0" y="0" width="240" height="176" rx="16" fill="#161b22" stroke="#4a3a12" stroke-width="1.5"/>
      <circle cx="34" cy="38" r="17" fill="#2a2109" stroke="#7a5c12"/>
      <text class="m" x="34" y="45" font-size="17" fill="#f0b429" text-anchor="middle">3</text>
      <text class="f st" x="24" y="94">서명만 전송</text>
      <text class="f sd" x="24" y="126">지문도 개인 키도</text>
      <text class="f sd" x="24" y="150">기기 밖으로 안 나감</text>
    </g>
    <line x1="844" y1="88" x2="880" y2="88" stroke="#3f4c5e" stroke-width="2" marker-end="url(#ar)"/>

    <!-- step 4 -->
    <g transform="translate(888,0)">
      <rect x="0" y="0" width="240" height="176" rx="16" fill="#161b22" stroke="#263041" stroke-width="1.5"/>
      <circle cx="34" cy="38" r="17" fill="#0f2545" stroke="#1f4b8f"/>
      <text class="m" x="34" y="45" font-size="17" fill="#6ea8fe" text-anchor="middle">4</text>
      <text class="f st" x="24" y="94">공개 키로 검증</text>
      <text class="f sd" x="24" y="126">서명이 진짜면</text>
      <text class="f sd" x="24" y="150">문이 열림</text>
    </g>
  </g>

  <rect x="72" y="392" width="1056" height="1" fill="#21262d"/>
  <text class="f" x="72" y="428" font-size="18" fill="#6e7681">서명은 정확한 사이트 주소에 묶여 만들어집니다 — 주소가 다르면 아예 동작하지 않습니다.</text>
</svg>
