<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 470" role="img" aria-label="패스키 로그인 원리 다이어그램. 개인 키는 내 기기에만 있고 서버에는 공개 키만 있으며, 로그인 때는 서명만 전송된다. 가짜 사이트에는 서명이 만들어지지 않는다.">
  <rect width="720" height="470" rx="16" fill="#f8fafc"/>
  <text x="360" y="42" font-family="sans-serif" font-size="22" font-weight="700" fill="#0f172a" text-anchor="middle">패스키는 어떻게 안전한가</text>

  <!-- 내 기기 -->
  <rect x="40" y="70" width="270" height="150" rx="14" fill="#ecfdf5" stroke="#10b981" stroke-width="2.5"/>
  <text x="175" y="103" font-family="sans-serif" font-size="18" font-weight="700" fill="#065f46" text-anchor="middle">내 기기 (폰·노트북)</text>
  <text x="175" y="135" font-family="sans-serif" font-size="16" font-weight="700" fill="#047857" text-anchor="middle">개인 키 — 여는 열쇠</text>
  <text x="175" y="160" font-family="sans-serif" font-size="13.5" fill="#334155" text-anchor="middle">지문·얼굴로만 잠금 해제</text>
  <text x="175" y="197" font-family="sans-serif" font-size="13" font-weight="700" fill="#dc2626" text-anchor="middle">개인 키·지문은 기기 밖으로 안 나감</text>

  <!-- 서버 -->
  <rect x="410" y="70" width="270" height="150" rx="14" fill="#eff6ff" stroke="#64748b" stroke-width="2"/>
  <text x="545" y="103" font-family="sans-serif" font-size="18" font-weight="700" fill="#1e293b" text-anchor="middle">서비스 서버</text>
  <text x="545" y="135" font-family="sans-serif" font-size="16" font-weight="700" fill="#475569" text-anchor="middle">공개 키 — 잠그는 열쇠</text>
  <text x="545" y="170" font-family="sans-serif" font-size="13.5" fill="#334155" text-anchor="middle">여기가 통째로 털려도</text>
  <text x="545" y="192" font-family="sans-serif" font-size="13.5" fill="#334155" text-anchor="middle">공개 키뿐이라 쓸모없음</text>

  <!-- 화살표 -->
  <line x1="312" y1="145" x2="406" y2="145" stroke="#0f172a" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="359" y="134" font-family="sans-serif" font-size="12.5" font-weight="700" fill="#0f172a" text-anchor="middle">서명만</text>
  <text x="359" y="167" font-family="sans-serif" font-size="12.5" font-weight="700" fill="#0f172a" text-anchor="middle">전송</text>

  <!-- 피싱 저항 -->
  <rect x="40" y="255" width="640" height="180" rx="14" fill="#fff7ed" stroke="#f59e0b" stroke-width="2"/>
  <text x="360" y="288" font-family="sans-serif" font-size="17" font-weight="700" fill="#9a3412" text-anchor="middle">가짜 사이트(피싱)엔 왜 안 통하나</text>
  <text x="360" y="322" font-family="sans-serif" font-size="14.5" fill="#334155" text-anchor="middle">서명은 '정확한 사이트 주소'에 묶여 만들어집니다.</text>
  <text x="360" y="349" font-family="sans-serif" font-size="14.5" fill="#334155" text-anchor="middle">주소가 다른 가짜 페이지에서는 패스키가 아예 동작하지 않습니다.</text>
  <text x="360" y="383" font-family="sans-serif" font-size="14.5" fill="#334155" text-anchor="middle">비밀번호라는 '정답'이 오가지 않으니, 훔칠 것도 없습니다.</text>
  <text x="360" y="414" font-family="sans-serif" font-size="13" font-weight="700" fill="#9a3412" text-anchor="middle">→ 사람이 속아도, 기계가 주소를 확인하기 때문입니다.</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0f172a"/>
    </marker>
  </defs>
</svg>
