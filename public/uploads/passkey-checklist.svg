<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" role="img" aria-label="지금 할 일 체크리스트">
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>
  <style>
    .f{font-family:Pretendard,'Pretendard Variable',-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif}
    .m{font-family:'JetBrains Mono',ui-monospace,SFMono-Regular,Consolas,monospace}
    .it{font-size:26px;font-weight:700;fill:#e6edf3}
    .sub{font-size:18px;fill:#8b949e}
  </style>

  <rect width="1200" height="600" fill="#0d1117"/>
  <rect width="1200" height="600" fill="url(#grid)"/>

  <rect x="72" y="56" width="4" height="24" rx="2" fill="#f0b429"/>
  <text class="m" x="92" y="75" font-size="18" letter-spacing="3" fill="#8b949e">한 장 정리</text>
  <text class="f" x="72" y="128" font-size="38" font-weight="700" fill="#e6edf3">그래서 지금 뭘 하면 되나요</text>

  <g transform="translate(72,176)">
    <rect x="0" y="0" width="1056" height="352" rx="18" fill="#161b22" stroke="#263041" stroke-width="1.5"/>

    <g transform="translate(44,52)">
      <rect x="0" y="0" width="30" height="30" rx="8" fill="#0f2545" stroke="#1f4b8f"/>
      <path d="M8 15 l6 6 l10 -12" fill="none" stroke="#6ea8fe" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text class="f it" x="52" y="16">자주 쓰는 계정부터 패스키를 켠다</text>
      <text class="f sub" x="52" y="46">구글 · 애플 · 네이버 · 카카오 보안 설정에서 등록</text>
    </g>

    <line x1="44" y1="146" x2="1012" y2="146" stroke="#21262d"/>

    <g transform="translate(44,176)">
      <rect x="0" y="0" width="30" height="30" rx="8" fill="#0f2545" stroke="#1f4b8f"/>
      <path d="M8 15 l6 6 l10 -12" fill="none" stroke="#6ea8fe" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text class="f it" x="52" y="16">기기 잠금을 반드시 걸어 둔다</text>
      <text class="f sub" x="52" y="46">패스키의 안전은 지문 · 얼굴 · PIN 위에 세워집니다</text>
    </g>

    <line x1="44" y1="270" x2="1012" y2="270" stroke="#21262d"/>

    <g transform="translate(44,296)">
      <rect x="0" y="0" width="30" height="30" rx="8" fill="#2a2109" stroke="#7a5c12"/>
      <path d="M8 15 l6 6 l10 -12" fill="none" stroke="#f0b429" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text class="f it" x="52" y="16">복구 수단을 하나 더 만들어 둔다</text>
    </g>
  </g>

  <text class="f" x="72" y="566" font-size="18" fill="#6e7681">아직 지원하지 않는 곳은 비밀번호 + 2단계 인증을 그대로 유지하세요.</text>
  <text class="m" x="1128" y="566" font-size="15" letter-spacing="2" fill="#39424e" text-anchor="end">PANCO_IT</text>
</svg>
