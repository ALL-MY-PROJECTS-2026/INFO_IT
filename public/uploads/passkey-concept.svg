<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" font-family="'Noto Sans KR',system-ui,'Malgun Gothic',sans-serif" aria-label="개념 도식: 개인 키는 내 기기에만 보관되고, 서버에는 공개 키만 있으며, 로그인 때는 서명만 오간다.">
  <title>패스키는 무엇을 어디에 두나</title>
  <rect x="2" y="2" width="1196" height="556" rx="20" fill="#f8f9fb" stroke="#eceef1" stroke-width="2"/>
  <text x="600" y="70" font-size="30" font-weight="800" fill="#1f2933" text-anchor="middle">무엇이 어디에 저장되나</text>

  <rect x="120" y="150" width="320" height="270" rx="16" fill="#ffffff" stroke="#2563eb" stroke-width="3"/>
  <rect x="258" y="196" width="44" height="66" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  <circle cx="280" cy="248" r="4" fill="#2563eb"/>
  <text x="280" y="316" font-size="28" font-weight="800" fill="#1f2933" text-anchor="middle">내 기기</text>
  <text x="280" y="352" font-size="22" font-weight="700" fill="#2563eb" text-anchor="middle">개인 키 보관</text>
  <text x="280" y="386" font-size="18" fill="#9aa4b2" text-anchor="middle">밖으로 안 나감</text>

  <rect x="760" y="150" width="320" height="270" rx="16" fill="#ffffff" stroke="#64748b" stroke-width="3"/>
  <rect x="890" y="205" width="60" height="18" rx="4" fill="#e2e8f0" stroke="#64748b" stroke-width="3"/>
  <rect x="890" y="233" width="60" height="18" rx="4" fill="#e2e8f0" stroke="#64748b" stroke-width="3"/>
  <text x="920" y="316" font-size="28" font-weight="800" fill="#1f2933" text-anchor="middle">서비스 서버</text>
  <text x="920" y="352" font-size="22" font-weight="700" fill="#64748b" text-anchor="middle">공개 키만 보관</text>
  <text x="920" y="386" font-size="18" fill="#9aa4b2" text-anchor="middle">털려도 안전</text>

  <line x1="440" y1="285" x2="760" y2="285" stroke="#cbd2dc" stroke-width="3"/>
  <rect x="500" y="262" width="200" height="46" rx="23" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="600" y="291" font-size="20" font-weight="700" fill="#5c6673" text-anchor="middle">서명만 오감 →</text>
  <text x="600" y="345" font-size="17" fill="#9aa4b2" text-anchor="middle">비밀번호는 전송 안 됨</text>
</svg>
