<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="1200" height="560" role="img" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif" aria-label="HelloWorld 코드를 세 부분으로 나눠 설명: class는 코드를 담는 상자, main은 프로그램의 시작점, System.out.println은 화면에 한 줄 출력.">
  <title>HelloWorld 코드 뜯어보기</title>
  <style>.m{font-family:'JetBrains Mono',ui-monospace,Consolas,monospace}</style>
  <rect width="1200" height="560" rx="0" fill="#ffffff"/>

  <text x="64" y="78" font-size="34" font-weight="700" fill="#26323c">HelloWorld, 한 줄씩 뜯어보기</text>
  <text x="64" y="112" font-size="18" fill="#77828d">복잡해 보여도 딱 세 조각입니다.</text>

  <!-- code card (light) -->
  <rect x="64" y="150" width="596" height="292" rx="16" fill="#f7f9fb" stroke="#e4e8ee" stroke-width="1.5"/>
  <rect x="82" y="272" width="560" height="30" rx="6" fill="#fff2d6"/>
  <text class="m" x="94" y="202" font-size="19"><tspan fill="#cf222e">public class </tspan><tspan fill="#24292f">HelloWorld {</tspan></text>
  <text class="m" x="94" y="246" font-size="19"><tspan fill="#24292f">    </tspan><tspan fill="#cf222e">public static void </tspan><tspan fill="#953800">main</tspan><tspan fill="#57606a">(String[] args) {</tspan></text>
  <text class="m" x="94" y="293" font-size="19"><tspan fill="#24292f">        System.out.println(</tspan><tspan fill="#0a3069">"Hello, World!"</tspan><tspan fill="#24292f">);</tspan></text>
  <text class="m" x="94" y="337" font-size="19" fill="#57606a">    }</text>
  <text class="m" x="94" y="381" font-size="19" fill="#57606a">}</text>

  <!-- connectors -->
  <path d="M660 196 C684 196 684 205 700 205" fill="none" stroke="#cfd6de" stroke-width="1.5"/>
  <path d="M660 240 C684 240 684 293 700 293" fill="none" stroke="#cfd6de" stroke-width="1.5"/>
  <path d="M660 287 C684 287 684 381 700 381" fill="none" stroke="#cfd6de" stroke-width="1.5"/>

  <!-- annotation cards -->
  <g>
    <rect x="700" y="168" width="440" height="76" rx="16" fill="#eef4ff" stroke="#d6e4ff" stroke-width="1.5"/>
    <circle cx="732" cy="206" r="15" fill="#3b6fd4"/><text x="732" y="212" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">1</text>
    <text x="760" y="200" font-size="19" font-weight="700" fill="#26323c">class — 코드를 담는 상자</text>
    <text x="760" y="226" font-size="15" fill="#77828d">공책의 표지. { } 안이 그 속입니다</text>
  </g>
  <g>
    <rect x="700" y="256" width="440" height="76" rx="16" fill="#eef4ff" stroke="#d6e4ff" stroke-width="1.5"/>
    <circle cx="732" cy="294" r="15" fill="#3b6fd4"/><text x="732" y="300" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">2</text>
    <text x="760" y="288" font-size="19" font-weight="700" fill="#26323c">main — 프로그램의 시작점</text>
    <text x="760" y="314" font-size="15" fill="#77828d">컴퓨터는 여기(1페이지)부터 읽습니다</text>
  </g>
  <g>
    <rect x="700" y="344" width="440" height="76" rx="16" fill="#fff4e0" stroke="#f2dfb5" stroke-width="1.5"/>
    <circle cx="732" cy="382" r="15" fill="#d98a1a"/><text x="732" y="388" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">3</text>
    <text x="760" y="376" font-size="19" font-weight="700" fill="#26323c">System.out.println — 화면 출력</text>
    <text x="760" y="402" font-size="15" fill="#77828d">따옴표 안 글자를 한 줄 찍습니다</text>
  </g>

  <text x="64" y="498" font-size="17" fill="#77828d">세미콜론 <tspan class="m" fill="#d9534f">;</tspan> 은 문장의 마침표 — 문장 끝마다 붙입니다.</text>
  <text x="1136" y="530" font-size="13" fill="#c2c9d2" text-anchor="end">PANCO_IT</text>
</svg>
